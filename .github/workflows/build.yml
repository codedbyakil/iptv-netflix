name: Build TamilFlix TV APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }
      - name: Install Gradle
        run: wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/g.zip && unzip -q /tmp/g.zip -d /opt/ && echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH
      - name: Build Debug APK
        run: cd app && gradle assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: { name: tamilflix-tv-v3.0, path: app/build/outputs/apk/debug/app-debug.apk }
